# Configuration
font_family                 Hack Nerd Font
font_size                   18

shell zsh 

#cursor_shape                block
remember_window_size        no
url_style curly

initial_window_width        950
initial_window_height       500
window_padding_width        20
cursor_blink_interval       0.5

background_opacity          0.7

bold_font                   auto
italic_font                 auto
bold_italic_font            auto




cursor_stop_blinking_after  1
scrollback_lines            2000
wheel_scroll_min_lines      1
enable_audio_bell           no

hide_window_decorations     yes

dynamic_background_opacity  yes
confirm_os_window_close     0
selection_foreground        none
selection_background        none

# Animated cursor follows text
include $HOME/.config/ml4w/settings/kitty-cursor-trail.conf

# Include wallpaper colors
include colors-matugen.conf

# Include Custom Configuration
# Create the file custom.conf in ~/.config/kitty to overwrite the default configuration
include $HOME/.config/kitty/custom.conf

background #090200
foreground #a4a1a1
cursor #a4a1a1
selection_background #494542
color0 #090200
color8 #5b5754
color1 #da2c20
color9 #e8bacf
color2 #00a152
color10 #3a3332
color3 #fcec02
color11 #494542
color4 #00a0e4
color12 #7f7c7b
color5 #a06994
color13 #d6d4d3
color6 #b5e4f4
color14 #ccab53
color7 #a4a1a1
color15 #f7f7f7
selection_foreground #090200
